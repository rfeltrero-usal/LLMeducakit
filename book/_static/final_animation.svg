<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <style>
    .orbit { transform-origin: 300px 300px; }
    @keyframes rotate360 { from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }
    @keyframes float { 0%{ transform: translateY(0);}50%{ transform: translateY(-8px);}100%{ transform: translateY(0);} }
    .orbit-1 { animation: rotate360 18s linear infinite; }
    .orbit-2 { animation: rotate360 14s linear reverse infinite; }
    .logo-pulse { animation: float 3s ease-in-out infinite; }
  </style>

  <rect width="100%" height="100%" fill="#0b1222" rx="12"/>

  <!-- center big logo -->
  <g transform="translate(300,300)" class="logo-pulse">
    <image href="_static/LOGO_LLMeducakit.png" x="-90" y="-90" width="180" height="180"/>
  </g>

  <!-- outer orbit 1 -->
  <g class="orbit orbit-1">
    <g transform="translate(300,80)">
      <image href="_static/colabcrea.svg" x="-36" y="-36" width="72" height="72"/>
    </g>
    <g transform="translate(450,180)">
      <image href="_static/ainnova.svg" x="-36" y="-36" width="72" height="72"/>
    </g>
    <g transform="translate(150,180)">
      <image href="_static/ainonim.svg" x="-36" y="-36" width="72" height="72"/>
    </g>
  </g>

  <!-- subtle stars background -->
  <g fill="#fff" opacity="0.06">
    <circle cx="40" cy="520" r="2"/>
    <circle cx="560" cy="40" r="1.5"/>
    <circle cx="520" cy="300" r="1.2"/>
    <circle cx="80" cy="120" r="1.6"/>
  </g>

</svg>