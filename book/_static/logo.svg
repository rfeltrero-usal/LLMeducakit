<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <style>
    .center-img { transform-origin: 200px 70px; }
    .orb { transform-origin: 200px 70px; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
    @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .orb-group { animation: orbit 12s linear infinite; }
    .orb circle { animation: pulse 3s ease-in-out infinite; }
    svg { overflow: visible; }
  </style>

  <!-- Background rounded -->
  <rect x="0" y="0" width="400" height="140" rx="18" fill="white" stroke="rgba(0,0,0,0.04)"/>

  <!-- Center: LLMeducakit logo raster (if exists) -->
  <g class="center-img">
    <image href="_static/LOGO_LLMeducakit.png" x="140" y="20" width="120" height="100" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- Orbiting icons group (rotates) -->
  <g class="orb-group">
    <g class="orb" transform="translate(200,70)">
      <g transform="translate(0,-60)">
        <circle r="22" fill="#ff8a00" opacity="0.95"/>
        <image href="_static/colabcrea.svg" x="-18" y="-18" width="36" height="36"/>
      </g>
    </g>

    <g class="orb" transform="translate(200,70) rotate(120)">
      <g transform="translate(0,-60)">
        <circle r="22" fill="#0077c8" opacity="0.95"/>
        <image href="_static/ainonim.svg" x="-18" y="-18" width="36" height="36"/>
      </g>
    </g>

    <g class="orb" transform="translate(200,70) rotate(240)">
      <g transform="translate(0,-60)">
        <circle r="22" fill="#8e44ad" opacity="0.95"/>
        <image href="_static/ainnova.svg" x="-18" y="-18" width="36" height="36"/>
      </g>
    </g>
  </g>

</svg>